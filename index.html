<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>실시간 채팅방</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f8f9fa; }
        #chat { border: 1px solid #ddd; height: 300px; overflow-y: scroll; padding: 10px; background: white; margin-bottom: 10px; border-radius: 5px; }
        .msg { margin-bottom: 8px; padding: 5px 10px; background: #e9ecef; border-radius: 10px; width: fit-content; }
        input { padding: 10px; width: 70%; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>💬 실시간 익명 대화</h2>
    <div id="chat"></div>
    <input id="txt" placeholder="메시지 입력..." autocomplete="off">
    <button onclick="send()">보내기</button>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io();
        const chat = document.getElementById('chat');
        const txt = document.getElementById('txt');

        function send() {
            if (txt.value) {
                socket.emit('message', txt.value);
                txt.value = '';
            }
        }

        socket.on('message', (msg) => {
            const div = document.createElement('div');
            div.className = 'msg';
            div.textContent = msg;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight; // 맨 아래로 자동 스크롤
        });

        txt.addEventListener('keypress', (e) => { if (e.key === 'Enter') send(); });
    </script>
</body>
</html>
