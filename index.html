<!DOCTYPE html>
<html>
<head>
    <title>HTML 온라인 게임 실습</title>
    <style>
        canvas { border: 2px solid black; background: #f0f0f0; }
    </style>
</head>
<body>
    <h1>실시간 멀티플레이 캔버스</h1>
    <canvas id="gameCanvas" width="500" height="400"></canvas>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const socket = io('http://localhost:3000'); // 서버 주소에 연결

        let allPlayers = {};

        // 서버로부터 플레이어 정보를 받음
        socket.on('updatePlayers', (players) => {
            allPlayers = players;
            draw();
        });

        // 화면 그리기 함수
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let id in allPlayers) {
                const p = allPlayers[id];
                ctx.fillStyle = (id === socket.id) ? "blue" : "red"; // 내 캐릭터는 파란색
                ctx.fillRect(p.x, p.y, 30, 30);
            }
        }

        // 키보드 입력 보내기
        window.addEventListener('keydown', (e) => {
            let move = { x: 0, y: 0 };
            if (e.key === 'ArrowUp') move.y = -5;
            if (e.key === 'ArrowDown') move.y = 5;
            if (e.key === 'ArrowLeft') move.x = -5;
            if (e.key === 'ArrowRight') move.x = 5;
            
            socket.emit('move', move); // 서버로 내 움직임을 보냄
        });
    </script>
</body>
</html>
