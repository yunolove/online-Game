<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>실시간 게임</title>
</head>
<body style="margin:0; overflow:hidden; background:#333; text-align:center;">
    <h2 style="color:white;">방향키로 움직이세요!</h2>
    <canvas id="g" width="500" height="400" style="background:white;"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const ctx = document.getElementById('g').getContext('2d');
        let ps = {};

        socket.on("update", (data) => { ps = data; draw(); });

        function draw() {
            ctx.clearRect(0, 0, 500, 400);
            for (let id in ps) {
                ctx.fillStyle = (id === socket.id) ? "red" : "blue";
                ctx.fillRect(ps[id].x, ps[id].y, 30, 30);
            }
        }

        window.onkeydown = (e) => {
            let d = {x:0, y:0};
            if(e.key==="ArrowUp") d.y=-10;
            if(e.key==="ArrowDown") d.y=10;
            if(e.key==="ArrowLeft") d.x=-10;
            if(e.key==="ArrowRight") d.x=10;
            socket.emit("move", d);
        };
    </script>
</body>
</html>
