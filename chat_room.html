<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>실시간 채팅방</title>
    <style>
        body { font-family: sans-serif; background: #e5ddd5; margin: 0; padding: 20px; }
        #messages { background: white; height: 400px; border: 1px solid #ccc; overflow-y: auto; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        .msg { background: #dcf8c6; padding: 8px 12px; border-radius: 10px; margin-bottom: 8px; width: fit-content; max-width: 80%; }
        input { width: 70%; padding: 12px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
        button { padding: 10px 20px; background: #128c7e; color: white; border: none; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="messages"></div>
    <input id="input" placeholder="메시지를 입력하세요..." autocomplete="off">
    <button onclick="send()">전송</button>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io();
        const msgDiv = document.getElementById('messages');
        const input = document.getElementById('input');

        function send() {
            if (input.value) {
                socket.emit('chat_msg', input.value);
                input.value = '';
            }
        }

        socket.on('chat_msg', (data) => {
            const div = document.createElement('div');
            div.className = 'msg';
            div.textContent = data;
            msgDiv.appendChild(div);
            msgDiv.scrollTop = msgDiv.scrollHeight;
        });

        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });
    </script>
</body>
</html>
